name: nightly-scan

on:
  schedule:
    # ~22:00 New York on Mon-Fri evenings (03:00 UTC Tue-Sat).
    # Cron is UTC; the hour drifts by 1h with DST, which is fine for EOD data.
    - cron: "0 3 * * 2-6"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: nightly-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run scan
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: python -m scanner.main

      - name: Commit scan results
        run: |
          git config user.name "scan-bot"
          git config user.email "actions@github.com"
          git add docs/data/latest.json
          git diff --cached --quiet || git commit -m "scan: $(date -u +%F)"
          git push
